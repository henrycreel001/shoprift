<!--
SHOPRIFT LOGO SNIPPETS
Drop these SVGs into any HTML carousel, story, post, or branded graphic.
The mark is 120x120 viewBox. Scale via width/height attributes.

ALL VARIANTS:
1. Primary gradient (mint→blue, on dark)
2. White mono (on dark)
3. Black mono (on light)
4. Mint mono (single-color mint)
5. Wordmark lockup (mark + "shoprift" text)
-->

     01 / Primary Gradient (default, on dark)
     ======================================== -->

  <defs>
    <linearGradient id="sg-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#6B8AFF"/>
    </linearGradient>
  </defs>
  <path d="M 22 27 L 58 27 L 78 47 L 78 55 L 52 55 L 42 45 L 22 45 Z" fill="url(#sg-primary)"/>
  <path d="M 98 93 L 62 93 L 42 73 L 42 65 L 68 65 L 78 75 L 98 75 Z" fill="url(#sg-primary)"/>
  <path d="M 44 58 L 76 58 L 76 62 L 44 62 Z" fill="url(#sg-primary)" opacity="0.6"/>
</svg>
